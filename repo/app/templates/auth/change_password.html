{% extends "base.html" %}
{% block title %}Change Password - MeridianCare{% endblock %}

{% block content %}
<h1>Change Password</h1>

<form method="POST" action="{{ url_for('auth.change_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="_nonce" value="{{ generate_nonce() }}">
    <input type="hidden" name="_timestamp" value="{{ generate_timestamp() }}">
    <div class="form-group">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" required class="form-control">
    </div>
    <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" required class="form-control">
    </div>
    <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Change Password</button>
</form>
{% endblock %}
