{% extends "base.html" %}

{% block title %}Login — MeridianCare{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <h2>Log In</h2>
        <div id="login-form-container">
            {% include "auth/_login_form.html" %}
        </div>
        <p class="auth-link">Don't have an account? <a href="{{ url_for('auth.register') }}" hx-get="{{ url_for('auth.register') }}" hx-target="#main-content" hx-select="#main-content" hx-push-url="true">Register</a></p>
    </div>
</div>
{% endblock %}
