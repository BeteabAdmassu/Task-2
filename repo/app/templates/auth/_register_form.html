{% if errors is defined and errors %}
<div class="alert alert-danger">
    <ul>
        {% for e in errors %}
        <li>{{ e }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}

<form hx-post="{{ url_for('auth.register') }}" hx-target="#register-form-container" hx-swap="innerHTML">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               value="{{ username|default('', true) }}"
               required minlength="3" maxlength="50" pattern="[a-zA-Z0-9_]+"
               hx-get="{{ url_for('auth.check_username') }}"
               hx-trigger="keyup changed delay:500ms"
               hx-target="#username-feedback"
               hx-params="username"
               autocomplete="username">
        <div id="username-feedback" class="field-feedback"></div>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               required minlength="8" autocomplete="new-password">
        <span class="field-hint">At least 8 characters with uppercase, lowercase, and a digit</span>
    </div>

    <div class="form-group">
        <label for="password_confirm">Confirm Password</label>
        <input type="password" id="password_confirm" name="password_confirm" class="form-control"
               required autocomplete="new-password">
    </div>

    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
</form>
