[tool:pytest]
# E2E tests run against a live server — exclude from in-process coverage run.
# Coverage is enforced on the unit/integration suite via run_tests.sh.
testpaths = tests
filterwarnings =
    ignore::sqlalchemy.exc.LegacyAPIWarning

[coverage:run]
source = app
omit =
    app/config.py
    app/utils/certs.py
    */migrations/*
    seed_test_data.py

[coverage:report]
fail_under = 90
show_missing = true
skip_covered = false
