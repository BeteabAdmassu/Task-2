# MeridianCare — nginx reverse proxy with TLS termination and rate limiting
# --------------------------------------------------------------------------
# Addresses the deployment-hardening requirement: real TLS + upstream
# rate-limiting that backs the in-app login throttle.
#
# Setup:
#   1. Replace ssl_certificate / ssl_certificate_key with a CA-issued cert
#      for internet-facing deployments.
#   2. Set the correct upstream address (127.0.0.1:5000 for same-host, or
#      the Docker service name e.g. "web:5000" when using Compose).
#   3. nginx -t && nginx -s reload

# Per-IP rate-limit zones (stored in shared memory).
#
# login_zone  — 10 req/min per IP, mirrors the in-app Flask limit so that
#               brute-force attempts are turned away before they even hit
#               the application layer.
# api_zone    — 120 req/min per IP for all other routes; adjust to taste.
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=120r/m;

# Upstream Flask app.  In a Docker Compose stack replace 127.0.0.1:5000
# with the service name, e.g.:  server web:5000;
upstream meridiancare_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # --- TLS ---
    # For production replace these with a CA-issued certificate (e.g. Let's
    # Encrypt).  To reuse the self-signed cert generated inside the container:
    #   ssl_certificate     /app/certs/cert.pem;
    #   ssl_certificate_key /app/certs/key.pem;
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Enable HSTS once the certificate is stable and you are confident in
    # the setup.  Start with a short max-age (e.g. 300) before going to 1 year.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Security headers (belt-and-suspenders with Flask's own headers) ---
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-Frame-Options        "DENY"        always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # --- Health check (no rate limit, used by Docker healthcheck) ---
    location = /health {
        proxy_pass         https://meridiancare_app;
        proxy_ssl_verify   off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # --- Login: tight rate limit (10 req/min, burst of 5) ---
    location = /auth/login {
        limit_req        zone=login_zone burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         https://meridiancare_app;
        proxy_ssl_verify   off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # --- Static assets: no rate limit, long cache ---
    location /static/ {
        proxy_pass         https://meridiancare_app;
        proxy_ssl_verify   off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # --- All other routes: general rate limit ---
    location / {
        limit_req        zone=api_zone burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         https://meridiancare_app;
        proxy_ssl_verify   off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # Support HTMX long-poll / SSE if added in future.
        proxy_read_timeout 60s;
    }
}
